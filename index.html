<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>睡眠大作戰💤 - 桌遊互動版</title>
    <style>
        :root {
            --dream-purple: #a18cd1;
            --dream-pink: #fbc2eb;
            --accent-gold: #ffe066;
            --success-blue: #007bff; /* 💡 已調成更明亮耀眼的螢光寶石藍 */
            --error-red: #e74c3c;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center;
            box-sizing: border-box;
            padding: 15px 10px;
        }

        .header { 
            text-align: center; 
            z-index: 20; 
            width: 100%;
        }
        .header h1 { 
            font-size: 1.8rem; 
            margin: 5px 0; 
            text-shadow: 0 0 10px rgba(161, 140, 209, 0.5);
        }
        .mode-selector { 
            display: flex; 
            justify-content: center;
            gap: 10px; 
            margin-top: 5px; 
            z-index: 20; 
        }
        .mode-btn {
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid var(--dream-purple);
            color: #fff; 
            padding: 8px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 1rem;
            font-weight: bold;
        }
        .mode-btn.active { background: var(--dream-purple); box-shadow: 0 0 15px var(--dream-purple); }

        .card-container { 
            perspective: 1200px; 
            width: 100%;
            max-width: 350px; 
            height: calc(100vh - 150px); 
            max-height: 530px; 
            z-index: 10; 
            position: relative; 
            margin: auto 0; 
        }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1.2); transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); border: 2px solid rgba(255, 255, 255, 0.15);
            overflow: hidden; padding: 20px; box-sizing: border-box;
        }

        .card-back { 
            background-image: url('卡背.png'); 
            background-size: cover;          
            background-position: center;    
            background-repeat: no-repeat;    
            background-color: #24243e;      
            z-index: 2; 
        }

        .card-front { background: #1a1a2e; transform: rotateY(180deg); z-index: 1; padding: 0; background-size: cover; background-position: center; } 

        .card-front.quiz-mode-active {
            background-image: url('問題卡背景.png');
            background-color: #fff; 
        }

        #feedbackMsg { 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 20px; 
            min-height: 1.5rem; 
            transition: 0.3s; 
            opacity: 0; 
            line-height: 1.4;
            width: 100%;
            box-sizing: border-box;
            text-align: center; 
        }
        
        .options-container { display: flex; flex-direction: column; gap: 10px; width: 100%; position: relative; z-index: 6; }
        
        .opt-btn {
            background: rgba(255, 255, 255, 0.85); border: 2px solid rgba(0, 0, 0, 0.15);
            color: #000000; padding: 14px 12px; border-radius: 14px; cursor: pointer; transition: 0.3s; font-size: 1.15rem; text-align: left;
            width: 100%; box-sizing: border-box; font-weight: bold;
        }
        /* ✨ 已調整：答對時背景改為耀眼明亮藍，並加上雙層立體發光特效 */
        .opt-btn.correct-glow { 
            border-color: var(--success-blue) !important; 
            background: var(--success-blue) !important; 
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.5); 
            color: #fff !important; 
        }
        .opt-btn.wrong-select { background: var(--error-red) !important; border-color: var(--error-red) !important; opacity: 0.9; color: #fff !important; }

        .quiz-overlay { 
            padding: 24px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            box-sizing: border-box; 
            background: transparent; 
        }

        .event-overlay { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        .event-image { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
        .event-info-btn {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(36, 36, 62, 0.95), rgba(26, 26, 46, 0.95)); 
            border: 2px dashed var(--accent-gold);
            color: #fff; padding: 6px 18px; border-radius: 30px;
            font-size: 0.95rem; font-weight: bold; cursor: pointer; z-index: 30;
            box-shadow: 0 4px 15px rgba(255, 224, 102, 0.25); transition: all 0.3s ease;
            display: flex; align-items: center; gap: 4px;
        }
        .event-info-btn span { color: var(--accent-gold); font-size: 1.1rem; }
        .event-info-btn:hover, .event-info-btn:active { 
            transform: translateX(-50%) scale(1.05); 
            border-style: solid;
            box-shadow: 0 4px 20px rgba(255, 224, 102, 0.5);
        }
        
        .footer-controls {
            width: 100%;
            text-align: center;
            z-index: 20;
            margin-bottom: 10px;
        }
        .main-btn { 
            background: linear-gradient(135deg, var(--dream-purple), var(--dream-pink)); 
            color: #fff; border: none; padding: 14px 60px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; font-size: 1.2rem; 
            box-shadow: 0 5px 15px rgba(161, 140, 209, 0.4);
            transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.95); }
        .main-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .quest-text { 
            font-size: 1.5rem; 
            line-height: 1.5; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000000; 
        }

        .confetti { 
            position: fixed; 
            z-index: 1000; 
            pointer-events: none; 
            border-radius: 2px;
        }
        @keyframes confetti-fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            25% { transform: translate(var(--x-spread), var(--y-up)) rotate(90deg); }
            100% { transform: translate(var(--x-final), 100vh) rotate(720deg); opacity: 0; }
        }

        .info-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 26, 0.85); display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .info-modal.show { opacity: 1; pointer-events: auto; }
        .info-box {
            background: linear-gradient(135deg, #24243e, #1a1a2e);
            border: 2px solid var(--dream-purple); box-shadow: 0 0 30px rgba(161, 140, 209, 0.4);
            width: 85%; max-width: 340px; border-radius: 20px; padding: 25px; box-sizing: border-box;
            text-align: center; transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .info-modal.show .info-box { transform: scale(1); }
        .info-title { font-size: 1.35rem; color: var(--accent-gold); font-weight: bold; margin-bottom: 14px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .info-text { font-size: 1.1rem; line-height: 1.6; color: #fff; margin-bottom: 20px; text-align: justify; font-weight: 500; }
        .info-close-btn {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb); border: none; color: #fff;
            padding: 12px 35px; border-radius: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%;
        }

        @media (max-height: 650px) {
            .header h1 { font-size: 1.5rem; }
            .card-container { height: calc(100vh - 120px); }
            .quest-text { font-size: 1.25rem; margin-bottom: 10px; line-height: 1.4; }
            .opt-btn { padding: 10px 12px; font-size: 1rem; }
            .main-btn { padding: 12px 45px; font-size: 1.1rem; }
            .info-box { padding: 18px; }
            .info-text { font-size: 0.95rem; margin-bottom: 14px; }
            .event-info-btn { bottom: 8px; padding: 5px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>睡眠大作戰💤</h1>
        <div class="mode-selector">
            <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')">問題挑戰卡</button>
            <button class="mode-btn active" id="btn-media" onclick="setMode('media')">事件互動卡</button>
        </div>
    </div>
    
    <div class="card-container">
        <div class="card-inner" id="cardInner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front" id="cardContent"></div>
        </div>
    </div>

    <div class="footer-controls">
        <button class="main-btn" id="drawBtn" onclick="handleDraw()">我要抽卡</button>
    </div>

    <div class="info-modal" id="infoModal">
        <div class="info-box">
            <div class="info-title">睡眠小百科💤</div>
            <div class="info-text" id="infoText">這裡是補充資料內容。</div>
            <button class="info-close-btn" onclick="closeInfoModal()">我知道了</button>
        </div>
    </div>

    <script>
        let currentMode = 'media'; 
        let isAnimating = false;
        let lastDrawnText = ""; 
        let activeQuizInfo = ""; 

        const quizData = [
            { text: "年長者每天建議睡眠時間約為？", options: ["3～4小時", "5～7小時", "9～12小時"], correct: 1, info: "專家建議年長者每天睡5到7小時就足夠了。雖然睡眠時間變短，但只要白天精神好，就不需要太過擔心喔！" },
            { text: "隨著年齡增加，睡眠常見的變化是？", options: ["睡得更深更久", "較容易淺眠或醒來", "完全不需要睡眠"], correct: 1, info: "隨著年齡增長，深層睡眠會減少，變得比較容易驚醒、淺眠，這是正常的生理老化現象，保持平常心面對即可。" },
            { text: "白天適度活動對睡眠的影響是？", options: ["幫助晚上更好入睡", "讓人更睡不著", "沒影響"], correct: 0, info: "白天多散步、活動身體，可以幫助大腦累積睡眠驅動力，到了晚上身體自然會產生睡意，大幅提升睡眠品質！" },
            { text: "午睡時間建議控制在多久較佳？", options: ["10～30分鐘", "1～2小時", "不限時間"], correct: 0, info: "午睡超過30分鐘容易進入深睡眠，醒來反而會昏昏沉沉，甚至打亂晚上的作息。小睡20分鐘效果最高！" },
            { text: "睡前喝大量水可能會？", options: ["睡得更好", "半夜頻繁起來上廁所", "沒影響"], correct: 1, info: "睡前1到2小時應減少水分攝取，避免夜間頻繁起來上廁所，打斷好不容易進入的深度睡眠，減少跌倒風險。" },
            { text: "睡前滑手機或看電視太久可能會？", options: ["幫助放鬆入睡", "影響入睡時間", "讓睡眠更深"], correct: 1, info: "3C螢幕散發出的藍光，會抑制大腦分泌「褪黑激素」，讓大腦誤以為現在還是白天，進而導致失眠或入睡困難。" },
            { text: "哪種飲品可能影響睡眠？", options: ["溫開水", "咖啡或濃茶", "溫牛奶"], correct: 1, info: "茶和咖啡含有咖啡因，會刺激中樞神經提神。加上利尿作用，年長者建議下午兩點過後就不要再喝茶或咖啡囉。" },
            { text: "規律作息對睡眠的幫助是？", options: ["幫助建立穩定生理時鐘", "沒有幫助", "讓人更累"], correct: 0, info: "每天固定時間起床、吃飯、睡覺，能幫助大腦和身體設定好穩定的生理時鐘，時間到了自然就會想睡覺。" },
            { text: "睡前做什麼活動較有助睡眠？", options: ["激烈運動", "放鬆伸展或聽音樂", "看刺激節目"], correct: 1, info: "睡前做太激烈的運動會讓心跳加快、體溫升高而更清醒。做些溫和的拉筋伸展、聽合弦音樂，最能放鬆大腦。" },
            { text: "夜間經常醒來可能與什麼有關？", options: ["正常且無需注意", "壓力或健康狀況", "一成是做夢"], correct: 1, info: "如果一個晚上頻繁醒來超過3次，可能跟心理壓力、身體疼痛、慢性病或睡眠呼吸中止症有關，不能大意喔。" },
            { text: "睡眠不足可能造成什麼影響？", options: ["精神不濟、容易疲倦", "變更有活力", "完全沒差"], correct: 0, info: "長期睡不飽延續白天沒精神、注意力無法集中，還會降低身體的免疫力，增加血壓不穩和慢性病的風險。" },
            { text: "睡眠品質不好可能影響？", options: ["記憶力與情緒", "身高", "鞋子大小"], correct: 0, info: "睡不好的時候，大腦無法好好清理廢物，隔天容易健忘、心情煩躁。維持好睡眠是保護大腦與好心情的關鍵！" },
            { text: "臥室環境怎樣較適合睡眠？", options: ["明亮吵雜", "安靜、舒適、光線柔和", "電視開整晚"], correct: 1, info: "全黑或微弱夜燈、安靜不吵雜的臥室最理想。有些人習慣開著電視睡覺，其實電視的聲音與光線會一直在暗中干擾大腦。" },
            { text: "睡前抽菸或喝酒可能會？", options: ["幫助入睡", "影響睡眠品質", "沒影響"], correct: 1, info: "喝酒雖然會讓人昏昏睡睡，成酒精在體內代謝時會破壞深層睡眠，讓人下半夜容易驚醒、口渴，反而睡得更累！" },
            { text: "若長期失眠，建議怎麼做？", options: ["忍耐就好", "諮詢醫師或專業人員", "不睡決"], correct: 1, info: "失眠如果持續超過一個月，就不該一味忍耐或自己亂吃藥，建議到睡眠門診或高齡醫學科諮詢專家最安全。" },
            { text: "打呼嚴重且呼吸不順可能代表？", options: ["睡得很好", "睡眠呼吸中止風險", "正常現象"], correct: 1, info: "打呼功能如果大聲到一半會突然沒聲音、像斷氣一樣，很可能是睡眠呼吸中止症，會導致大腦缺氧，應盡早就醫檢查。" },
            { text: "晚餐時間太晚可能會？", options: ["幫助入睡", "影響消化與睡眠", "沒影響"], correct: 1, info: "晚餐如果吃太晚或吃太飽，腸煙在睡眠時被迫加班蠕動消化，不但容易引發胃食道逆流，也會讓人睡得很不安穩。" },
            { text: "白天長時間不活動可能會？", options: ["更好睡", "影響晚上的睡眠", "沒關係"], correct: 1, info: "如果白天整天躺著、坐著看電視不動，身體沒有消耗能量，到了晚上自然就不會有足夠的睡意，容易變成惡性循環。" },
            { text: "睡前情緒緊張或焦慮會？", options: ["更快入睡", "影響入睡", "幫助深睡"], correct: 1, info: "焦慮會激發身體的交感神經，讓血壓上升、心跳變快，身體進入防衛狀態。睡前想些開心的事，有助放鬆神經。" },
            { text: "良好的睡眠對長者重要性是？", options: ["維持健康與生活品質", "沒什麼幫助", "只是休息而已"], correct: 0, info: "優質的睡眠是長者對抗老化、維持好體力與好記憶力的天然補藥！睡得好，白天的生活才會充滿笑容與活力！" }
        ];
        const eventData = [
            { text: "大家丟骰子比大小，數字最大的玩家，將自己的一個失眠怪給任意一位玩家。", img: "數位卡V2-01.png", info: "與朋友一起玩桌遊、動動腦並開懷大笑，可以舒緩一整天的壓力。心情放鬆了，自律神經就會穩定，晚上自然更好睡喔！" },
            { text: "和下家猜拳，贏了沒事，輸了拿走對方一個失眠怪。", img: "數位卡V2-02.png", info: "適度的社交互動能活化大腦！多與鄰居、朋友聊天互動，可以減少孤獨感與憂鬱情緒，這是維持好睡眠的隱形良藥。" },
            { text: "選一位玩家猜拳，輸了沒事，贏了拿走對方一個失眠怪。", img: "數位卡V2-03.png", info: "猜拳能帶來小小的期待與樂趣。白天多安排好玩、有挑戰性的休閒活動，能有效消耗精神，讓夜晚的睡眠更深層。" },
            { text: "將雙手舉高，伸懶腰，將一個失眠怪，給失眠怪最少的玩家，包括自己。", img: "數位卡V2-04.png", info: "伸懶腰與拉筋能放鬆緊繃的肌肉、促進全身血液循環。當身體排除了多餘的緊繃感，躺上床時就會更快入睡。" },
            { text: "先吸氣4秒，再憋氣7秒，最後吐氣8秒，將自己的一個失眠怪，給失眠怪最少的玩家，包括自己。", img: "數位卡V2-05.png", info: "這是著名的「4-7-8呼吸法」，能強迫身體調降心跳速度，啟動負責放鬆的副交感神經，是公認最強的天然安眠藥！" },
            { text: "固定睡眠、起床時間，建議入睡時間為晚間11點之前，再轉一次行動轉盤。", img: "數位卡V2-06.png", info: "每天在固定的時間上床與起床，能建立強大的生理時鐘。配合大腦在深夜十到十一點分泌褪黑激素的黃金期，睡眠品質最高！" },
            { text: "所有玩家點頭、仰頭、左彎、右彎各5秒鐘，完成後清空天平。", img: "數位卡V2-07.png", info: "放鬆頸部與肩膀是現代人失眠的關鍵。舒緩肩頸壓力可以改善大腦的血液灌流，讓交感神經平靜，大腦就會收到該睡覺的信號了。" },
            { text: "所有玩家幫右手邊的玩家捶捶背，完成後清空天平。", img: "數位卡V2-08.png", info: "輕柔的搥背與按摩能促進大腦分泌「催產素」和「多巴胺」，這些幸福荷爾蒙能有效降低焦慮、安定心神，幫助深度睡眠。" },

        let quizPool = [];
        let eventPool = [];

        function initPool(type) {
            if (type === 'quiz') {
                quizPool = Array.from({length: quizData.length}, (_, i) => i);
            } else {
                eventPool = Array.from({length: eventData.length}, (_, i) => i);
            }
        }

        initPool('quiz');
        initPool('media');

        function setMode(mode) {
            if (isAnimating) return;
            currentMode = mode;
            document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
            document.getElementById('btn-media').classList.toggle('active', mode === 'media');
            
            const cardContent = document.getElementById('cardContent');
            document.getElementById('cardInner').classList.remove('is-flipped');
            
            if (mode === 'quiz') {
                cardContent.classList.add('quiz-mode-active');
            } else {
                cardContent.classList.remove('quiz-mode-active');
            }
            
            window.speechSynthesis.cancel(); 
            lastDrawnText = ""; 
            activeQuizInfo = ""; 
            closeInfoModal(); 
        }

        function speak(text, callback) {
            if (!text) {
                if (callback) callback();
                return;
            }
            
            let processedText = text.replace(/選項\s*A[、.]?/gi, "選項 ㄟ、")
                                    .replace(/\bA\b/g, "ㄟ")
                                    .replace(/答案：A/gi, "答案：ㄟ");

            const msg = new SpeechSynthesisUtterance(processedText);
            msg.lang = 'zh-TW'; 
            msg.rate = 1.00; 

            if (callback) {
                msg.onend = () => { callback(); };
            }
            window.speechSynthesis.speak(msg);
        }

        function replaySpeech() {
            if (lastDrawnText) {
                window.speechSynthesis.cancel();
                speak(lastDrawnText);
            }
        }

        function showInfoModal(infoText) {
            if (!infoText) return;
            document.getElementById('infoText').innerText = infoText;
            document.getElementById('infoModal').classList.add('show');
            speak("睡眠小百科：" + infoText);
        }

        function closeInfoModal() {
            document.getElementById('infoModal').classList.remove('show');
            window.speechSynthesis.cancel();
        }

        async function handleDraw() {
            if (isAnimating) return;
            window.speechSynthesis.cancel(); 
            closeInfoModal();

            isAnimating = true;
            const inner = document.getElementById('cardInner');
            const btn = document.getElementById('drawBtn');

            btn.disabled = true;

            if (inner.classList.contains('is-flipped')) {
                inner.classList.remove('is-flipped');
                setTimeout(() => {
                    const contentText = updateCardContent();
                    inner.classList.add('is-flipped');
                    
                    setTimeout(() => { 
                        speak(contentText); 
                        isAnimating = false; 
                        btn.disabled = false; 
                    }, 400);
                }, 400);
            } else {
                const contentText = updateCardContent();
                inner.classList.add('is-flipped');
                setTimeout(() => { 
                    speak(contentText); 
                    isAnimating = false; 
                    btn.disabled = false; 
                }, 800);
            }
        }

        function updateCardContent() {
            const container = document.getElementById('cardContent');
            let textToRead = "";
            
            if (currentMode === 'quiz') {
                container.classList.add('quiz-mode-active');

                if (quizPool.length === 0) {
                    initPool('quiz');
                }
                
                const randomIndexInPool = Math.floor(Math.random() * quizPool.length);
                const actualIndex = quizPool.splice(randomIndexInPool, 1)[0];
                const q = quizData[actualIndex];
                
                textToRead = `${q.text}。選項 A、${q.options[0]}。選項 B、${q.options[1]}。選項 C、${q.options[2]}。`;
                activeQuizInfo = q.info; 
                
                let optHtml = q.options.map((o, i) => `<button class="opt-btn" data-index="${i}">${String.fromCharCode(65+i)}. ${o}</button>`).join('');
                
                container.innerHTML = `
                <div class="quiz-overlay">
                    <div class="quest-text" onclick="replaySpeech()">${q.text}</div>
                    <div class="options-container" id="optList">${optHtml}</div>
                    <div id="feedbackMsg"></div>
                </div>`;
                
                setTimeout(() => {
                    const btns = container.querySelectorAll('.opt-btn');
                    btns.forEach(btn => {
                        btn.onclick = () => checkAnswer(btn, parseInt(btn.dataset.index), q.correct, q.options[q.correct]);
                    });
                }, 500); 
            } else {
                container.classList.remove('quiz-mode-active');

                if (eventPool.length === 0) {
                    initPool('media');
                }
                
                const randomIndexInPool = Math.floor(Math.random() * eventPool.length);
                const actualIndex = eventPool.splice(randomIndexInPool, 1)[0];
                const e = eventData[actualIndex];
                
                textToRead = e.text;
                activeQuizInfo = e.info; 
                
                container.innerHTML = `
                <div class="event-overlay">
                    <img src="${e.img}" class="event-image" alt="事件圖片" onclick="replaySpeech()">
                    <button class="event-info-btn" onclick="window.speechSynthesis.cancel(); showInfoModal(activeQuizInfo)"><span>💡</span> 睡眠小百科💤</button>
                </div>`;
            }
            
            lastDrawnText = textToRead; 
            return textToRead;
        }

        function checkAnswer(selectedBtn, selectedIndex, correctIndex, correctText) {
            const list = document.getElementById('optList');
            const btns = list.querySelectorAll('.opt-btn');
            const msg = document.getElementById('feedbackMsg');
            
            btns.forEach(b => b.style.pointerEvents = 'none');
            msg.style.opacity = "1";
            window.speechSynthesis.cancel();

            const correctLetter = String.fromCharCode(65 + correctIndex);
            msg.style.textAlign = "center"; 

            if (selectedIndex === correctIndex) {
                selectedBtn.classList.add('correct-glow');
                msg.innerHTML = "太棒了！答對囉<br>可以丟棄一個失眠怪！";
                msg.style.color = "var(--success-blue)"; 
                
                createConfetti(window.innerWidth / 2, window.innerHeight / 2);
                
                speak("太棒了！答對囉，可以丟棄一個失眠怪！", () => {
                    showInfoModal(activeQuizInfo);
                });
            } else {
                selectedBtn.classList.add('wrong-select');
                btns[correctIndex].classList.add('correct-glow'); 
                
                msg.innerHTML = `正確答案：${correctLetter}. ${correctText}`;
                msg.style.color = "#e74c3c"; 
                
                speak(`這題答錯了，正確答案是：選項 ${correctLetter} ， ${correctText}`, () => {
                    showInfoModal(activeQuizInfo);
                });
            }
        }

        function createConfetti(x, y) {
            const colors = ['#3498db', '#a18cd1', '#ffe066', '#fff', '#74ebd5']; 
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[colors.length * Math.random() | 0];
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = Math.random() * 12 + 8 + 'px';
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                confetti.style.setProperty('--x-spread', (Math.random() - 0.5) * 400 + 'px');
                confetti.style.setProperty('--y-up', (Math.random() * -200 - 100) + 'px');
                confetti.style.setProperty('--x-final', (Math.random() - 0.5) * 600 + 'px');
                
                confetti.style.animation = `confetti-fall ${Math.random() * 2 + 1.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
                
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3500);
            }
        }
    </script>
